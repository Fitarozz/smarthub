<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tauri + React + Typescript</title>
    <script>
      if (new URLSearchParams(location.search).has('overlay')) {
        document.documentElement.style.cssText = 'background:transparent!important';
        document.addEventListener('DOMContentLoaded', function() {
          document.body.style.cssText = 'background:transparent!important;margin:0';
          var r = document.getElementById('root');
          if (r) r.style.cssText = 'background:transparent!important';
        });
      }
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
