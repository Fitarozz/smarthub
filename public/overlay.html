<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Overlay</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background: transparent !important;
        overflow: hidden;
        font-family: Inter, Avenir, Helvetica, Arial, sans-serif;
      }

      body {
        display: flex;
        align-items: flex-start;
        justify-content: flex-start;
        padding: 10px;
      }

      .overlay-container {
        opacity: 0;
        transform: translateX(-12px);
        transition: opacity 0.25s ease, transform 0.25s ease;
        pointer-events: none;
      }

      .overlay-container.visible {
        opacity: 1;
        transform: translateX(0);
        pointer-events: auto;
      }

      #back-button {
        border: 1px solid rgba(255, 255, 255, 0.2);
        background: rgba(10, 12, 20, 0.88);
        color: #fff;
        border-radius: 10px;
        padding: 10px 18px;
        font-size: 14px;
        font-weight: 500;
        font-family: inherit;
        cursor: pointer;
        min-width: 100px;
        min-height: 38px;
        letter-spacing: 0.03em;
        backdrop-filter: blur(12px);
        box-shadow: 0 4px 16px rgba(0,0,0,0.45);
        transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
        display: flex;
        align-items: center;
        gap: 6px;
      }

      #back-button:hover {
        background: rgba(40, 42, 60, 0.92);
        transform: scale(1.05);
        box-shadow: 0 6px 24px rgba(0,0,0,0.55);
      }

      #back-button:active {
        transform: scale(0.96);
      }

      .arrow {
        font-size: 16px;
        line-height: 1;
      }
    </style>
  </head>
  <body>
    <div id="overlay-container" class="overlay-container">
      <button id="back-button"><span class="arrow">←</span> Menu</button>
    </div>
    <script type="module">
      import { emit } from "@tauri-apps/api/event";

      const button = document.getElementById("back-button");
      const container = document.getElementById("overlay-container");

      if (!button || !container) {
        console.error("Overlay elements missing");
      } else {
        button.addEventListener("click", async () => {
          try {
            await emit("smart-tv-back", null);
          } catch (err) {
            console.error("Failed to emit smart-tv-back:", err);
          }
        });

        // Show overlay when mouse enters the window area
        let hideTimeout = null;

        const show = () => {
          container.classList.add("visible");
          clearTimeout(hideTimeout);
          hideTimeout = setTimeout(() => {
            container.classList.remove("visible");
          }, 3000);
        };

        const keepVisible = () => {
          clearTimeout(hideTimeout);
          container.classList.add("visible");
        };

        const scheduleHide = () => {
          hideTimeout = setTimeout(() => {
            container.classList.remove("visible");
          }, 1500);
        };

        // Show on mouse entering the overlay window
        document.addEventListener("mouseenter", show);
        // Keep visible while hovering button
        button.addEventListener("mouseenter", keepVisible);
        button.addEventListener("mouseleave", scheduleHide);
        // Initial show
        show();
      }

      // Guarantee transparency
      document.documentElement.style.background = "transparent";
      document.body.style.background = "transparent";
    </script>
  </body>
</html>
